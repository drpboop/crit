<!DOCTYPE html>
<html>
<head>
<title>critter</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:"Century Gothic",sans-serif;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:#111;
  padding:20px;
  border-radius:10px;
  box-sizing:border-box;
}

h2,
h3{
  text-align:center;
}

.topRow{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:15px;
}

.topRow label{
  display:flex;
  align-items:center;
  gap:5px;
}

input,
select,
textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  background:#222;
  color:#fff;
  box-sizing:border-box;
}

textarea{
  min-height:70px;
}

label{
  display:block;
  margin-top:10px;
}

.section{
  display:none;
}

.buttons{
  text-align:center;
  margin-top:15px;
}

button{
  padding:8px 14px;
  margin:5px;
  background:#444;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#555;
}

.dangerButton{
  background:#722;
}

.dangerButton:hover{
  background:#933;
}

.output{
  margin-top:15px;
}

.output textarea{
  min-height:100px;
}

.logControls{
  margin-top:30px;
  padding-top:20px;
  border-top:1px solid #444;
  text-align:center;
}

.logCount{
  color:#aaa;
  font-size:14px;
  margin-bottom:8px;
}

.status{
  text-align:center;
  margin-top:10px;
  min-height:20px;
  color:#8aff9d;
}
</style>
</head>

<body>

<div class="container">

<h2>critter</h2>

<div class="topRow">

  <label>
    <input
      type="checkbox"
      onclick="showForm('crit',this)"
    >
    crit
  </label>

  <label>
    <input
      type="checkbox"
      onclick="showForm('provider',this)"
    >
    provider
  </label>

  <label>
    <input
      type="checkbox"
      onclick="showForm('xfer',this)"
    >
    xfer
  </label>

</div>

<!-- CRIT -->
<div id="crit" class="section">

<label>agent name</label>
<input id="c_name">

<label>agt id</label>
<input id="c_id">

<label>mbr id / pa#</label>
<input id="c_mbr_pa">

<label>rx</label>
<input id="c_rx">

<label>resolution quick select</label>

<select onchange="addCrit(this.value); this.selectedIndex=0;">

  <option value="">
    -- select --
  </option>

  <option value="updated pa detailing on file to reflect dating approved by rph">
    pa dating
  </option>

  <option value="updated pa detailing on file to reflect strength approved by rph">
    pa strength
  </option>

  <option value="updated pa detailing on file to reflect drug approved by rph">
    pa drug
  </option>

  <option value="updated pa on file to reflect quantity approved by rph">
    quantity update
  </option>

  <option value="updated from pens to syringes per member request">
    pens → syringes mbr
  </option>

  <option value="updated from pens to syringes per doctor's request">
    pens → syringes dr
  </option>

  <option value="updated from syringes to pens per member request">
    syringes → pens mbr
  </option>

  <option value="updated from syringes to pens per doctor's request">
    syringes → pens dr
  </option>

  <option value="updated from multidose bottle to single-use vials per mdo request">
    multidose → vials
  </option>

  <option value="updated pa detailing on file for high dollar on approved medication">
    high dollar
  </option>

  <option value="transferred from previous account same type of plan and um review">
    same plan transfer
  </option>

  <option value="pa cannot be transferred // new pa required">
    pa not transferable
  </option>

  <option value="extended loading dose pa by 2 weeks per pharmacy request (verify claims received)">
    extended loading
  </option>

  <option value="backdated to mm/dd/yyyy per mdo request">
    backdated
  </option>

  <option value="added pa as it was not added when case was approved">
    missing pa
  </option>

  <option value="updated rx restrictions and claims paid">
    rx restrictions
  </option>

  <option value="called to go over denial // reviewed next steps">
    denial call
  </option>

  <option value="called to go over approval // provided approval information">
    approval call
  </option>

  <option value="advised clinical review cannot assist // referred to ssa">
    ssa redirect
  </option>

</select>

<label>resolution</label>
<textarea id="c_res"></textarea>

</div>

<!-- PROVIDER -->
<div id="provider" class="section">

<label>name</label>
<input id="p_name">

<label>job title</label>
<input id="p_title">

<label>agt id</label>
<input id="p_agent_id">

<label>npi</label>
<input id="p_npi">

<label>cb#</label>
<input id="p_cb">

<label>fax#</label>
<input id="p_fax">

<label>mbr id / pa#</label>
<input id="p_mbr_pa">

<label>rx</label>
<input
  id="p_rx"
  oninput="updateProvider()"
>

<label>resolution quick select</label>

<select onchange="providerPick(this.value); this.selectedIndex=0;">

  <option value="">
    -- select --
  </option>

  <option value="verbal">
    verbal pa request
  </option>

</select>

<label>resolution</label>
<textarea id="p_res"></textarea>

</div>

<!-- XFER -->
<div id="xfer" class="section">

<label>caller name</label>
<input id="x_name">

<label>facility / npi</label>
<input id="x_fac">

<label>agt id</label>
<input id="x_agent_id">

<label>mbr id / pa#</label>
<input id="x_mbr_pa">

<label>rx</label>
<input id="x_rx">

<label>xferred to</label>
<input id="x_to">

<label>reason</label>

<select id="x_reason">

  <option value="">
    -- select --
  </option>

  <option value="pa">
    pa
  </option>

  <option value="appeal">
    appeal
  </option>

  <option value="request p2p">
    request p2p
  </option>

  <option value="go over denial">
    go over denial
  </option>

</select>

</div>

<div class="buttons">

  <button onclick="generate()">
    generate
  </button>

  <button onclick="clearOutput()">
    clear output
  </button>

  <button onclick="resetForm()">
    reset form
  </button>

</div>

<div id="output" class="output"></div>

<div id="saveStatus" class="status"></div>

<!-- BACKGROUND LOG -->
<div class="logControls">

<h3>background activity log</h3>

<div id="logCount" class="logCount">
  0 saved entries
</div>

<div class="buttons">

  <button onclick="downloadCSV()">
    download excel csv
  </button>

  <button onclick="showBackgroundLog()">
    view saved log
  </button>

  <button
    class="dangerButton"
    onclick="clearLog()"
  >
    clear saved log
  </button>

</div>

</div>

</div>

<script>

let active="";
let activityLog=[];

/* LOAD SAVED LOG */
window.addEventListener("DOMContentLoaded",function(){

  const savedLog=
    localStorage.getItem("critterBackgroundLog");

  if(savedLog){

    try{
      activityLog=JSON.parse(savedLog);
    }catch(error){
      activityLog=[];
    }

  }

  updateLogCount();

});

/* SHOW SELECTED FORM */
function showForm(type,element){

  active=type;

  document
    .querySelectorAll(".section")
    .forEach(section=>{
      section.style.display="none";
    });

  document
    .getElementById(type)
    .style.display="block";

  document
    .querySelectorAll(".topRow input")
    .forEach(checkbox=>{
      checkbox.checked=false;
    });

  element.checked=true;

}

/* CRIT QUICK SELECT */
function addCrit(value){

  if(!value) return;

  const resolution=
    document.getElementById("c_res");

  resolution.value=
    resolution.value
      ? resolution.value+" // "+value
      : value;

}

/* PROVIDER QUICK SELECT */
function providerPick(value){

  if(value==="verbal"){

    const rx=
      document.getElementById("p_rx").value;

    document
      .getElementById("p_res")
      .value=
        `called to request a verbal pa for ${rx} // pega intake #`;

  }

}

/* UPDATE PROVIDER RX IN RESOLUTION */
function updateProvider(){

  const resolution=
    document.getElementById("p_res");

  const rx=
    document.getElementById("p_rx").value;

  if(resolution.value.includes("verbal pa")){

    resolution.value=
      `called to request a verbal pa for ${rx} // pega intake #`;

  }

}

/* BUILD XFER RESOLUTION */
function buildXfer(){

  const reason=
    document.getElementById("x_reason").value;

  const transferredTo=
    document.getElementById("x_to").value.trim();

  return `called to check status on ${reason} // advised pa intake line // xferred to ${transferredTo}`;

}

/* CREATE DATE AND TIME */
function getDateTime(){

  return new Date().toLocaleString();

}

/* GENERATE NOTE AND SAVE LOG */
function generate(){

  let fullOutput="";
  let logEntry=null;

  if(!active){

    document
      .getElementById("output")
      .innerHTML=
        "<p style='text-align:center;'>please select a form first.</p>";

    return;

  }

  /* CRIT */
  if(active==="crit"){

    const name=
      document.getElementById("c_name").value.trim();

    const agentId=
      document.getElementById("c_id").value.trim();

    const memberPa=
      document.getElementById("c_mbr_pa").value.trim();

    const rx=
      document.getElementById("c_rx").value.trim();

    const resolution=
      document.getElementById("c_res").value.trim();

    fullOutput=
      `${name} // ${agentId} // ${rx} // ${resolution} // drp crit prime 866.202.3474`;

    logEntry={
      dateTime:getDateTime(),
      type:"crit",
      agentId:agentId,
      memberPa:memberPa,
      actionResolution:resolution
    };

  }

  /* PROVIDER */
  if(active==="provider"){

    const name=
      document.getElementById("p_name").value.trim();

    const title=
      document.getElementById("p_title").value.trim();

    const agentId=
      document.getElementById("p_agent_id").value.trim();

    const memberPa=
      document.getElementById("p_mbr_pa").value.trim();

    const rx=
      document.getElementById("p_rx").value.trim();

    const resolution=
      document.getElementById("p_res").value.trim();

    /*
      NPI, callback number, fax number,
      AGT ID, and MBR ID/PA# remain on the form
      but are not included in the copied output.
    */
    fullOutput=
      `${name} // ${title} // ${rx} // ${resolution} // drp crit prime 866.202.3474`;

    logEntry={
      dateTime:getDateTime(),
      type:"provider",
      agentId:agentId,
      memberPa:memberPa,
      actionResolution:resolution
    };

  }

  /* XFER */
  if(active==="xfer"){

    const name=
      document.getElementById("x_name").value.trim();

    const facility=
      document.getElementById("x_fac").value.trim();

    const agentId=
      document.getElementById("x_agent_id").value.trim();

    const memberPa=
      document.getElementById("x_mbr_pa").value.trim();

    const rx=
      document.getElementById("x_rx").value.trim();

    const transferResolution=
      buildXfer();

    fullOutput=
      `${name} // ${facility} // ${rx} // ${transferResolution} // drp crit prime 866.202.3474`;

    logEntry={
      dateTime:getDateTime(),
      type:"xfer",
      agentId:agentId,
      memberPa:memberPa,
      actionResolution:transferResolution
    };

  }

  document
    .getElementById("output")
    .innerHTML=`
      <textarea
        id="generatedText"
        readonly
        onclick="this.select()"
      ></textarea>

      <div class="buttons">
        <button onclick="copyOutput()">
          copy
        </button>
      </div>
    `;

  document
    .getElementById("generatedText")
    .value=fullOutput;

  /*
    SAVE LOG ENTRY IN BROWSER STORAGE
  */
  if(logEntry){

    activityLog.unshift(logEntry);

    saveBackgroundLog();

    updateLogCount();

    showStatus("entry added to background log");

  }

}

/* COPY GENERATED NOTE */
async function copyOutput(){

  const generatedText=
    document.getElementById("generatedText");

  if(!generatedText) return;

  try{

    await navigator.clipboard.writeText(
      generatedText.value
    );

    showStatus("note copied");

  }catch(error){

    generatedText.select();

    document.execCommand("copy");

    showStatus("note copied");

  }

}

/* STATUS MESSAGE */
function showStatus(message,isError=false){

  const status=
    document.getElementById("saveStatus");

  status.textContent=message;

  status.style.color=
    isError ? "#ff8a8a" : "#8aff9d";

  setTimeout(function(){

    status.textContent="";

  },3000);

}

/* CLEAR GENERATED OUTPUT */
function clearOutput(){

  document
    .getElementById("output")
    .innerHTML="";

  document
    .getElementById("saveStatus")
    .textContent="";

}

/* RESET FORM */
function resetForm(){

  document
    .querySelectorAll(".section input")
    .forEach(element=>{
      element.value="";
    });

  document
    .querySelectorAll(".section textarea")
    .forEach(element=>{
      element.value="";
    });

  document
    .querySelectorAll(".section select")
    .forEach(select=>{
      select.selectedIndex=0;
    });

  document
    .querySelectorAll(".section")
    .forEach(section=>{
      section.style.display="none";
    });

  document
    .querySelectorAll(".topRow input")
    .forEach(checkbox=>{
      checkbox.checked=false;
    });

  clearOutput();

  active="";

}

/* SAVE LOG TO BROWSER */
function saveBackgroundLog(){

  localStorage.setItem(
    "critterBackgroundLog",
    JSON.stringify(activityLog)
  );

}

/* UPDATE SAVED ENTRY COUNT */
function updateLogCount(){

  const count=activityLog.length;

  document
    .getElementById("logCount")
    .textContent=
      count===1
        ? "1 saved entry"
        : `${count} saved entries`;

}

/* VIEW SAVED LOG */
function showBackgroundLog(){

  if(activityLog.length===0){

    alert("there are no saved entries.");

    return;

  }

  const logWindow=
    window.open("","_blank");

  if(!logWindow){

    alert(
      "please allow pop-ups to view the saved log."
    );

    return;

  }

  let rows="";

  activityLog.forEach(entry=>{

    rows+=`
      <tr>
        <td>${escapeHTML(entry.dateTime)}</td>
        <td>${escapeHTML(entry.type)}</td>
        <td>${escapeHTML(entry.agentId)}</td>
        <td>${escapeHTML(entry.memberPa)}</td>
        <td>${escapeHTML(entry.actionResolution)}</td>
      </tr>
    `;

  });

  logWindow.document.write(`
    <!DOCTYPE html>
    <html>

    <head>

      <title>critter activity log</title>

      <style>

        body{
          background:#000;
          color:#fff;
          font-family:"Century Gothic",sans-serif;
          padding:20px;
        }

        table{
          width:100%;
          border-collapse:collapse;
        }

        th,
        td{
          border:1px solid #555;
          padding:10px;
          text-align:left;
          vertical-align:top;
        }

        th{
          background:#222;
        }

        td{
          background:#111;
        }

      </style>

    </head>

    <body>

      <h2>critter activity log</h2>

      <table>

        <thead>

          <tr>
            <th>date/time</th>
            <th>type</th>
            <th>agt id</th>
            <th>mbr id/pa#</th>
            <th>action/res</th>
          </tr>

        </thead>

        <tbody>
          ${rows}
        </tbody>

      </table>

    </body>

    </html>
  `);

  logWindow.document.close();

}

/* PROTECT DISPLAYED TEXT */
function escapeHTML(value){

  const div=
    document.createElement("div");

  div.textContent=value || "";

  return div.innerHTML;

}

/* CLEAR SAVED LOG */
function clearLog(){

  if(activityLog.length===0){

    alert("there are no saved entries.");

    return;

  }

  const confirmed=
    confirm(
      "are you sure you want to clear the entire background log?"
    );

  if(!confirmed) return;

  activityLog=[];

  localStorage.removeItem(
    "critterBackgroundLog"
  );

  updateLogCount();

  showStatus("background log cleared");

}

/* DOWNLOAD CSV FOR EXCEL */
function downloadCSV(){

  if(activityLog.length===0){

    alert(
      "there are no saved entries to download."
    );

    return;

  }

  const headers=[
    "Date/Time",
    "Type",
    "AGT ID",
    "MBR ID/PA#",
    "Action/Res"
  ];

  const rows=
    activityLog.map(entry=>[
      entry.dateTime,
      entry.type,
      entry.agentId,
      entry.memberPa,
      entry.actionResolution
    ]);

  const csvData=[
    headers,
    ...rows
  ]
  .map(row=>
    row
      .map(value=>csvEscape(value))
      .join(",")
  )
  .join("\n");

  const blob=
    new Blob(
      ["\uFEFF"+csvData],
      {
        type:"text/csv;charset=utf-8;"
      }
    );

  const link=
    document.createElement("a");

  const url=
    URL.createObjectURL(blob);

  const today=
    new Date()
      .toISOString()
      .split("T")[0];

  link.href=url;

  link.download=
    `critter-activity-log-${today}.csv`;

  document.body.appendChild(link);

  link.click();

  document.body.removeChild(link);

  URL.revokeObjectURL(url);

  showStatus("excel csv downloaded");

}

/* FORMAT CSV VALUES */
function csvEscape(value){

  const text=
    String(value || "")
      .replace(/"/g,'""');

  return `"${text}"`;

}

</script>

</body>
</html>
