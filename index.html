<!DOCTYPE html>
<html>
<head>
<title>critter</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:"Century Gothic",sans-serif;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:#111;
  padding:20px;
  border-radius:10px;
  box-sizing:border-box;
}

.topRow{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:15px;
}

.topRow label{
  display:flex;
  align-items:center;
  gap:5px;
}

input, select, textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  background:#222;
  color:#fff;
  box-sizing:border-box;
}

textarea{
  min-height:70px;
}

label{
  display:block;
  margin-top:10px;
}

.section{
  display:none;
}

.buttons{
  text-align:center;
  margin-top:15px;
}

button{
  padding:8px 14px;
  margin:5px;
  background:#444;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#555;
}

.output{
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;">critter</h2>

<div class="topRow">
  <label>
    <input type="checkbox" onclick="showForm('crit',this)">
    crit
  </label>

  <label>
    <input type="checkbox" onclick="showForm('provider',this)">
    provider
  </label>

  <label>
    <input type="checkbox" onclick="showForm('xfer',this)">
    xfer
  </label>
</div>

<!-- CRIT -->
<div id="crit" class="section">

<label>agent name</label>
<input id="c_name">

<label>agent id</label>
<input id="c_id">

<label>mbr id / pa#</label>
<input id="c_mbr_pa">

<label>rx</label>
<input id="c_rx">

<label>resolution quick select</label>
<select onchange="addCrit(this.value); this.selectedIndex=0;">
  <option value="">-- select --</option>

  <option value="updated pa detailing on file to reflect dating approved by rph">
    pa dating
  </option>

  <option value="updated pa detailing on file to reflect strength approved by rph">
    pa strength
  </option>

  <option value="updated pa detailing on file to reflect drug approved by rph">
    pa drug
  </option>

  <option value="updated pa on file to reflect quantity approved by rph">
    quantity update
  </option>

  <option value="updated from pens to syringes per member request">
    pens → syringes mbr
  </option>

  <option value="updated from pens to syringes per doctor's request">
    pens → syringes dr
  </option>

  <option value="updated from syringes to pens per member request">
    syringes → pens mbr
  </option>

  <option value="updated from syringes to pens per doctor's request">
    syringes → pens dr
  </option>

  <option value="updated from multidose bottle to single-use vials per mdo request">
    multidose → vials
  </option>

  <option value="updated pa detailing on file for high dollar on approved medication">
    high dollar
  </option>

  <option value="transferred from previous account same type of plan and um review">
    same plan transfer
  </option>

  <option value="pa cannot be transferred // new pa required">
    pa not transferable
  </option>

  <option value="extended loading dose pa by 2 weeks per pharmacy request (verify claims received)">
    extended loading
  </option>

  <option value="backdated to mm/dd/yyyy per mdo request">
    backdated
  </option>

  <option value="added pa as it was not added when case was approved">
    missing pa
  </option>

  <option value="updated rx restrictions and claims paid">
    rx restrictions
  </option>

  <option value="called to go over denial // reviewed next steps">
    denial call
  </option>

  <option value="called to go over approval // provided approval information">
    approval call
  </option>

  <option value="advised clinical review cannot assist // referred to ssa">
    ssa redirect
  </option>
</select>

<label>resolution</label>
<textarea id="c_res"></textarea>

</div>

<!-- PROVIDER -->
<div id="provider" class="section">

<label>name</label>
<input id="p_name">

<label>job title</label>
<input id="p_title">

<label>npi</label>
<input id="p_npi">

<label>cb#</label>
<input id="p_cb">

<label>fax#</label>
<input id="p_fax">

<label>mbr id / pa#</label>
<input id="p_mbr_pa">

<label>rx</label>
<input id="p_rx" oninput="updateProvider()">

<label>resolution quick select</label>
<select onchange="providerPick(this.value); this.selectedIndex=0;">
  <option value="">-- select --</option>
  <option value="verbal">verbal pa request</option>
</select>

<label>resolution</label>
<textarea id="p_res"></textarea>

</div>

<!-- XFER -->
<div id="xfer" class="section">

<label>caller name</label>
<input id="x_name">

<label>facility / npi</label>
<input id="x_fac">

<label>mbr id / pa#</label>
<input id="x_mbr_pa">

<label>rx</label>
<input id="x_rx">

<label>xferred to</label>
<input id="x_to">

<label>reason</label>
<select id="x_reason">
  <option value="">-- select --</option>
  <option value="pa">pa</option>
  <option value="appeal">appeal</option>
  <option value="request p2p">request p2p</option>
  <option value="go over denial">go over denial</option>
</select>

</div>

<div class="buttons">
  <button onclick="generate()">generate</button>
  <button onclick="clearOutput()">clear output</button>
  <button onclick="resetForm()">reset form</button>
</div>

<div id="output" class="output"></div>

</div>

<script>

let active="";

function showForm(type, el){
  active=type;

  document.querySelectorAll(".section").forEach(section=>{
    section.style.display="none";
  });

  document.getElementById(type).style.display="block";

  document.querySelectorAll(".topRow input").forEach(checkbox=>{
    checkbox.checked=false;
  });

  el.checked=true;
}

/* CRIT */
function addCrit(value){
  if(!value) return;

  const resolution=document.getElementById("c_res");

  resolution.value=resolution.value
    ? resolution.value+" // "+value
    : value;
}

/* PROVIDER */
function providerPick(value){
  if(value==="verbal"){
    const rx=document.getElementById("p_rx").value;

    document.getElementById("p_res").value=
      `called to request a verbal pa for ${rx} // pega intake #`;
  }
}

function updateProvider(){
  const resolution=document.getElementById("p_res");
  const rx=document.getElementById("p_rx").value;

  if(resolution.value.includes("verbal pa")){
    resolution.value=
      `called to request a verbal pa for ${rx} // pega intake #`;
  }
}

/* XFER */
function buildXfer(){
  const reason=document.getElementById("x_reason").value;
  const transferredTo=document.getElementById("x_to").value;

  return `called to check status on ${reason} // advised pa intake line and connected them w/colleague // xferred to ${transferredTo}`;
}

/* GENERATE */
function generate(){
  let text="";

  if(active==="crit"){
    const name=document.getElementById("c_name").value;
    const id=document.getElementById("c_id").value;
    const rx=document.getElementById("c_rx").value;
    const resolution=document.getElementById("c_res").value;

    text=`${name} // ${id} // ${rx} // ${resolution} // drp crit prime 866.202.3474`;
  }

  if(active==="provider"){
    const name=document.getElementById("p_name").value;
    const title=document.getElementById("p_title").value;
    const rx=document.getElementById("p_rx").value;
    const resolution=document.getElementById("p_res").value;

    /*
      NPI, callback number, fax number, and mbr id / pa#
      are intentionally excluded from the output.
    */
    text=`${name} // ${title} // ${rx} // ${resolution} // drp crit prime 866.202.3474`;
  }

  if(active==="xfer"){
    const name=document.getElementById("x_name").value;
    const facility=document.getElementById("x_fac").value;
    const rx=document.getElementById("x_rx").value;

    text=`${name} // ${facility} // ${rx} // ${buildXfer()} // drp crit prime 866.202.3474`;
  }

  if(!active){
    document.getElementById("output").innerHTML=
      "<p style='text-align:center;'>please select a form first.</p>";
    return;
  }

  document.getElementById("output").innerHTML=`
    <textarea id="generatedText" readonly onclick="this.select()"></textarea>

    <div class="buttons">
      <button onclick="copyOutput()">copy</button>
    </div>
  `;

  document.getElementById("generatedText").value=text;
}

async function copyOutput(){
  const generatedText=document.getElementById("generatedText");

  if(!generatedText) return;

  try{
    await navigator.clipboard.writeText(generatedText.value);
  }catch(error){
    generatedText.select();
    document.execCommand("copy");
  }
}

function clearOutput(){
  document.getElementById("output").innerHTML="";
}

function resetForm(){
  document.querySelectorAll("input, textarea").forEach(element=>{
    element.value="";
  });

  document.querySelectorAll("select").forEach(select=>{
    select.selectedIndex=0;
  });

  document.querySelectorAll(".section").forEach(section=>{
    section.style.display="none";
  });

  document.querySelectorAll(".topRow input").forEach(checkbox=>{
    checkbox.checked=false;
  });

  clearOutput();
  active="";
}

</script>

</body>
</html>
