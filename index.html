<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>call notes</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  background:#000;
  color:#fff;
  font-family:"Century Gothic", sans-serif;
  margin:0;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:#111;
  padding:18px;
  border-radius:10px;
}

h2{text-align:center;margin-bottom:15px;}

label{
  display:block;
  margin:6px 0 3px;
  text-transform: lowercase;
}

input, textarea, select{
  width:100%;
  background:#222;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:6px;
}

textarea{
  resize:none;
  overflow:hidden;
  min-height:60px;
}

.row{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:15px;
}

.formSection{display:none;}

.button-row{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

button{
  background:#444;
  color:#fff;
  border:none;
  padding:8px 14px;
  border-radius:5px;
  text-transform: lowercase;
  cursor:pointer;
}

.outputBox{
  margin-top:15px;
  background:#111;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>call type</h2>

<div class="row">
<label><input type="checkbox" onclick="selectType('crit')"> crit</label>
<label><input type="checkbox" onclick="selectType('provider')"> provider</label>
<label><input type="checkbox" onclick="selectType('xfer')"> xfer</label>
</div>

<!-- CRIT -->
<div id="crit" class="formSection">
<label>agent name:</label>
<input id="c_name">

<label>agent id:</label>
<input id="c_id">

<label>rx:</label>
<input id="c_rx">

<label>resolution:</label>

<select onchange="addCritRes(this.value)">
<option value="">-- quick select --</option>

<option value="updated pa detailing on file to reflect dating approved by rph">pa dating</option>
<option value="updated pa detailing on file to reflect strength approved by rph">pa strength</option>
<option value="updated pa detailing on file to reflect drug approved by rph">pa drug</option>
<option value="updated pa on file to reflect quantity approved by rph">quantity update</option>

<option value="updated from pens to syringes per member request">pens → syringes (mbr)</option>
<option value="updated from pens to syringes per doctor's request">pens → syringes (dr)</option>
<option value="updated from syringes to pens per member request">syringes → pens (mbr)</option>
<option value="updated from syringes to pens per doctor's request">syringes → pens (dr)</option>

<option value="updated from multidose bottle to single-use vials per mdo request">multidose → vials</option>

<option value="updated pa detailing on file for high dollar on approved medication">high dollar</option>

<option value="transferred from previous account same type of plan and um review">same plan transfer</option>

<option value="pa cannot be transferred // new pa required">pa not transferable</option>

<option value="extended loading dose pa by 2 weeks per pharmacy request (verify claims received)">extended loading</option>

<option value="backdated to mm/dd/yyyy per mdo request">backdated</option>

<option value="added pa as it was not added when case was approved">missing pa added</option>

<option value="updated rx restrictions and claims paid">rx restrictions</option>

<option value="called to go over denial // reviewed next steps">denial call</option>
<option value="called to go over approval // provided approval information">approval call</option>

<option value="advised clinical review cannot assist // referred to ssa">ssa redirect</option>

</select>

<textarea id="c_res" oninput="autoExpand(this)"></textarea>
</div>

<!-- PROVIDER -->
<div id="provider" class="formSection">
<label>name:</label>
<input id="p_name">

<label>job title:</label>
<input id="p_title">

<label>npi:</label>
<input id="p_npi">

<label>cb#:</label>
<input id="p_cb">

<label>fax#:</label>
<input id="p_fax">

<label>rx:</label>
<input id="p_rx">

<label>resolution:</label>

<select onchange="fillProviderRes(this.value)">
<option value="">-- quick select --</option>
<option value="verbal pa">verbal pa request</option>
</select>

<textarea id="p_res" oninput="autoExpand(this)"></textarea>
</div>

<!-- XFER -->
<div id="xfer" class="formSection">
<label>caller name:</label>
<input id="x_name">

<label>facility / npi:</label>
<input id="x_fac">

<label>rx:</label>
<input id="x_rx">

<label>xferred to:</label>
<input id="x_to">

<label>resolution:</label>

<select onchange="fillXferRes(this.value)">
<option value="">-- quick select --</option>
<option value="standard">standard xfer script</option>
</select>

<textarea id="x_res" oninput="autoExpand(this)"></textarea>
</div>

<div class="button-row">
<button onclick="generate()">generate</button>
<button onclick="clearOutput()">clear output</button>
<button onclick="resetForm()">reset form</button>
</div>

<div id="output"></div>

</div>

<script>

function autoExpand(el){
  el.style.height="auto";
  el.style.height=el.scrollHeight+"px";
}

let activeType="";

function selectType(type){
  activeType=type;
  document.querySelectorAll('.formSection').forEach(f=>f.style.display='none');
  document.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false);

  document.getElementById(type).style.display='block';

  if(type==="crit") document.querySelectorAll('input[type=checkbox]')[0].checked=true;
  if(type==="provider") document.querySelectorAll('input[type=checkbox]')[1].checked=true;
  if(type==="xfer") document.querySelectorAll('input[type=checkbox]')[2].checked=true;
}

/* CRIT STACK */
function addCritRes(val){
  if(!val) return;
  const box=document.getElementById("c_res");
  box.value = box.value ? box.value + " // " + val : val;
  autoExpand(box);
}

/* ✅ PROVIDER RX-INJECT */
function fillProviderRes(val){
  if(val==="verbal pa"){
    p_res.value = `called to request a verbal pa for ${p_rx.value}. pega intake # `;
    autoExpand(p_res);
  }
}

/* XFER */
function fillXferRes(val){
  if(val==="standard"){
    x_res.value = `called to check status on pa/appeal/request p2p/go over denial. advised this is the pa intake line and i would connect them with my colleague with provider/member services. warm / cold transferred caller to cc. agent xxxxx assisted caller.`;
    autoExpand(x_res);
  }
}

function generate(){
  let text="";

  if(activeType==="crit"){
    text = `${c_name.value} // ${c_id.value} // ${c_rx.value} // ${c_res.value} // drp crit prime therapeutics 866.202.3474`;
  }

  if(activeType==="provider"){
    text = `${p_name.value} // ${p_title.value} // npi#${p_npi.value} // cb#${p_cb.value} // fax#${p_fax.value} // ${p_rx.value} // ${p_res.value} // drp crit prime therapeutics 866.202.3474`;
  }

  if(activeType==="xfer"){
    text = `${x_name.value} // ${x_fac.value} // ${x_rx.value} // xferred to ${x_to.value} // ${x_res.value} // drp crit prime therapeutics 866.202.3474`;
  }

  document.getElementById("output").innerHTML = `
    <div class="outputBox">
      <textarea readonly onclick="this.select()">${text}</textarea>
      <div class="button-row">
        <button onclick="copyText(this)">copy</button>
      </div>
    </div>
  `;
}

function copyText(btn){
  const t=btn.closest('.outputBox').querySelector('textarea');
  t.select();
  document.execCommand("copy");
}

function clearOutput(){
  document.getElementById("output").innerHTML="";
}

function resetForm(){
  document.querySelectorAll("input,textarea").forEach(el=>{
    el.value="";
    el.style.height="auto";
  });

  document.querySelectorAll('.formSection').forEach(f=>f.style.display='none');
  document.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false);

  clearOutput();
  activeType="";
}

</script>

</body>
</html>
