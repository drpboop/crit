<!DOCTYPE html>
<html>
<head>
<title>critter</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:"Century Gothic",sans-serif;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:#111;
  padding:20px;
  border-radius:10px;
  box-sizing:border-box;
}

h2,
h3{
  text-align:center;
}

.topRow{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:15px;
}

.topRow label{
  display:flex;
  align-items:center;
  gap:5px;
}

input,
select,
textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  background:#222;
  color:#fff;
  box-sizing:border-box;
}

textarea{
  min-height:70px;
}

label{
  display:block;
  margin-top:10px;
}

.section{
  display:none;
}

.buttons{
  text-align:center;
  margin-top:15px;
}

button{
  padding:8px 14px;
  margin:5px;
  background:#444;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#555;
}

.dangerButton{
  background:#722;
}

.dangerButton:hover{
  background:#933;
}

.output{
  margin-top:15px;
}

.output textarea{
  min-height:100px;
}

.logControls{
  margin-top:30px;
  padding-top:20px;
  border-top:1px solid #444;
  text-align:center;
}

.logCount{
  color:#aaa;
  font-size:14px;
  margin-bottom:8px;
}

.status{
  text-align:center;
  margin-top:10px;
  min-height:20px;
  color:#8aff9d;
}

.transferFields{
  display:none;
  margin-top:15px;
  padding:12px;
  border:1px solid #333;
  border-radius:8px;
  background:#181818;
}

.resetArea{
  text-align:center;
  margin-top:10px;
}

.clearLogArea{
  text-align:center;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>critter</h2>

<div class="topRow">

  <label>
    <input
      type="checkbox"
      onclick="showForm('crit',this)"
    >
    crit
  </label>

  <label>
    <input
      type="checkbox"
      onclick="showForm('provider',this)"
    >
    provider
  </label>

</div>

<!-- CRIT -->
<div id="crit" class="section">

<label>agt id</label>
<input id="c_id">

<label>mbr id / pa#</label>
<input id="c_mbr_pa">

<label>rx</label>
<input id="c_rx">

<label>res</label>

<select onchange="addCrit(this.value); this.selectedIndex=0;">

  <option value="">
    -- select --
  </option>

  <option value="updated pa detailing on file to reflect dating approved by rph">
    pa dating
  </option>

  <option value="updated pa detailing on file to reflect strength approved by rph">
    pa strength
  </option>

  <option value="updated pa detailing on file to reflect drug approved by rph">
    pa drug
  </option>

  <option value="updated pa on file to reflect quantity approved by rph">
    quantity update
  </option>

  <option value="updated from pens to syringes per member request">
    pens → syringes mbr
  </option>

  <option value="updated from pens to syringes per doctor's request">
    pens → syringes dr
  </option>

  <option value="updated from syringes to pens per member request">
    syringes → pens mbr
  </option>

  <option value="updated from syringes to pens per doctor's request">
    syringes → pens dr
  </option>

  <option value="updated from multidose bottle to single-use vials per mdo request">
    multidose → vials
  </option>

  <option value="updated pa detailing on file for high dollar on approved medication">
    high dollar
  </option>

  <option value="transferred from previous account same type of plan and um review">
    same plan transfer
  </option>

  <option value="pa cannot be transferred // new pa required">
    pa not transferable
  </option>

  <option value="extended loading dose pa by 2 weeks per pharmacy request (verify claims received)">
    extended loading
  </option>

  <option value="backdated to mm/dd/yyyy per mdo request">
    backdated
  </option>

  <option value="added pa as it was not added when case was approved">
    missing pa
  </option>

  <option value="updated rx restrictions and claims paid">
    rx restrictions
  </option>

  <option value="called to go over denial // reviewed next steps">
    denial call
  </option>

  <option value="called to go over approval // provided approval information">
    approval call
  </option>

  <option value="advised clinical review cannot assist // referred to ssa">
    ssa redirect
  </option>

  <option value="xfer to correct lob">
    xfer
  </option>

</select>

<label>resolution</label>
<textarea id="c_res"></textarea>

</div>

<!-- PROVIDER -->
<div id="provider" class="section">

<label>name</label>
<input id="p_name">

<label>job title</label>
<input id="p_title">

<label>npi#</label>
<input id="p_npi">

<label>cb#</label>
<input id="p_cb">

<label>fax#</label>
<input id="p_fax">

<label>mbr id / pa#</label>
<input id="p_mbr_pa">

<label>rx</label>
<input
  id="p_rx"
  oninput="updateProviderResolution()"
>

<label>res</label>

<select
  id="p_quick_select"
  onchange="providerPick(this.value)"
>

  <option value="">
    -- select --
  </option>

  <option value="verbal">
    verbal pa request
  </option>

  <option value="xfer">
    xfer
  </option>

</select>

<div
  id="providerTransferFields"
  class="transferFields"
>

  <label>xfer reason</label>

  <select
    id="p_xfer_reason"
    onchange="updateProviderResolution()"
  >

    <option value="">
      -- select --
    </option>

    <option value="pa">
      pa
    </option>

    <option value="appeal">
      appeal
    </option>

    <option value="request p2p">
      request p2p
    </option>

    <option value="go over denial">
      go over denial
    </option>

  </select>

  <label>xferred to</label>

  <input
    id="p_xfer_to"
    oninput="updateProviderResolution()"
  >

</div>

<label>resolution</label>
<textarea id="p_res"></textarea>

</div>

<div class="buttons">

  <button onclick="generate()">
    create
  </button>

  <button onclick="clearOutput()">
    clear
  </button>

</div>

<div id="output" class="output"></div>

<!-- RESET ALWAYS VISIBLE BELOW OUTPUT/COPY -->
<div class="resetArea">

  <button onclick="resetForm()">
    reset
  </button>

</div>

<div id="saveStatus" class="status"></div>

<!-- ACTIVITY LOG -->
<div class="logControls">

<h3>activity log</h3>

<div id="logCount" class="logCount">
  0 saved entries
</div>

<div class="buttons">

  <button onclick="downloadCSV()">
    pop
  </button>

  <button onclick="showActivityLog()">
    view
  </button>

</div>

<div class="clearLogArea">

  <button
    class="dangerButton"
    onclick="clearLog()"
  >
    clear log
  </button>

</div>

</div>

</div>

<script>

let active="";
let activityLog=[];
let providerMode="provider";

/* CREATE UNIQUE LOG ID */
function createLogId(){

  return (
    Date.now().toString()+
    Math.random().toString(16).slice(2)
  );

}

/* LOAD SAVED LOG */
window.addEventListener("DOMContentLoaded",function(){

  const savedLog=
    localStorage.getItem("critterActivityLog");

  if(savedLog){

    try{

      activityLog=JSON.parse(savedLog);

    }catch(error){

      activityLog=[];

    }

  }

  let logChanged=false;

  activityLog.forEach(entry=>{

    if(!entry.id){

      entry.id=createLogId();
      logChanged=true;

    }

  });

  if(logChanged){

    saveActivityLog();

  }

  updateLogCount();

});

/* SHOW SELECTED FORM */
function showForm(type,element){

  active=type;

  document
    .querySelectorAll(".section")
    .forEach(section=>{
      section.style.display="none";
    });

  document
    .getElementById(type)
    .style.display="block";

  document
    .querySelectorAll(".topRow input")
    .forEach(checkbox=>{
      checkbox.checked=false;
    });

  element.checked=true;

}

/* CRIT QUICK SELECT */
function addCrit(value){

  if(!value) return;

  const resolution=
    document.getElementById("c_res");

  resolution.value=
    resolution.value
      ? resolution.value+" // "+value
      : value;

}

/* PROVIDER QUICK SELECT */
function providerPick(value){

  const transferFields=
    document.getElementById(
      "providerTransferFields"
    );

  const resolution=
    document.getElementById("p_res");

  if(value==="verbal"){

    providerMode="provider";

    transferFields.style.display="none";

    document
      .getElementById("p_xfer_reason")
      .selectedIndex=0;

    document
      .getElementById("p_xfer_to")
      .value="";

    const rx=
      document.getElementById("p_rx").value.trim();

    resolution.value=
      `called to request a verbal pa for ${rx} // pega intake #`;

  }else if(value==="xfer"){

    providerMode="xfer";

    transferFields.style.display="block";

    updateProviderResolution();

  }else{

    providerMode="provider";

    transferFields.style.display="none";

  }

}

/* UPDATE PROVIDER RESOLUTION */
function updateProviderResolution(){

  const resolution=
    document.getElementById("p_res");

  const rx=
    document.getElementById("p_rx").value.trim();

  const reason=
    document.getElementById("p_xfer_reason").value;

  const transferredTo=
    document.getElementById("p_xfer_to").value.trim();

  if(providerMode==="provider"){

    if(resolution.value.includes("verbal pa")){

      resolution.value=
        `called to request a verbal pa for ${rx} // pega intake #`;

    }

  }

  if(providerMode==="xfer"){

    resolution.value=
      `called to check status on ${reason} // advised pa intake line // xferred to ${transferredTo}`;

  }

}

/* CREATE DATE AND TIME */
function getDateTime(){

  return new Date().toLocaleString();

}

/* CREATE NOTE AND SAVE LOG */
function generate(){

  let fullOutput="";
  let logEntry=null;

  if(!active){

    document
      .getElementById("output")
      .innerHTML=
        "<p style='text-align:center;'>please select a form first.</p>";

    return;

  }

  /* CRIT */
  if(active==="crit"){

    const agentId=
      document.getElementById("c_id").value.trim();

    const memberPa=
      document.getElementById("c_mbr_pa").value.trim();

    const rx=
      document.getElementById("c_rx").value.trim();

    const resolution=
      document.getElementById("c_res").value.trim();

    fullOutput=
      `${agentId} // ${rx} // ${resolution} // drp crit prime 866.202.3474`;

    logEntry={
      id:createLogId(),
      dateTime:getDateTime(),
      type:"crit",
      agentId:agentId,
      memberPa:memberPa,
      actionResolution:resolution
    };

  }

  /* PROVIDER OR XFER */
  if(active==="provider"){

    const name=
      document.getElementById("p_name").value.trim();

    const title=
      document.getElementById("p_title").value.trim();

    const memberPa=
      document.getElementById("p_mbr_pa").value.trim();

    const rx=
      document.getElementById("p_rx").value.trim();

    const resolution=
      document.getElementById("p_res").value.trim();

    fullOutput=
      `${name} // ${title} // ${rx} // ${resolution} // drp crit prime 866.202.3474`;

    logEntry={
      id:createLogId(),
      dateTime:getDateTime(),
      type:providerMode==="xfer"
        ? "xfer"
        : "provider",
      agentId:name,
      memberPa:memberPa,
      actionResolution:resolution
    };

  }

  document
    .getElementById("output")
    .innerHTML=`
      <textarea
        id="generatedText"
        readonly
        onclick="this.select()"
      ></textarea>

      <div class="buttons">
        <button onclick="copyOutput()">
          copy
        </button>
      </div>
    `;

  document
    .getElementById("generatedText")
    .value=fullOutput;

  if(logEntry){

    activityLog.unshift(logEntry);

    saveActivityLog();

    updateLogCount();

    showStatus("added");

  }

}

/* COPY CREATED NOTE */
async function copyOutput(){

  const generatedText=
    document.getElementById("generatedText");

  if(!generatedText) return;

  try{

    await navigator.clipboard.writeText(
      generatedText.value
    );

    showStatus("note copied");

  }catch(error){

    generatedText.select();

    document.execCommand("copy");

    showStatus("note copied");

  }

}

/* STATUS MESSAGE */
function showStatus(message,isError=false){

  const status=
    document.getElementById("saveStatus");

  status.textContent=message;

  status.style.color=
    isError
      ? "#ff8a8a"
      : "#8aff9d";

  setTimeout(function(){

    status.textContent="";

  },3000);

}

/* CLEAR CREATED OUTPUT */
function clearOutput(){

  document
    .getElementById("output")
    .innerHTML="";

  document
    .getElementById("saveStatus")
    .textContent="";

}

/* RESET FORM */
function resetForm(){

  document
    .querySelectorAll(".section input")
    .forEach(element=>{
      element.value="";
    });

  document
    .querySelectorAll(".section textarea")
    .forEach(element=>{
      element.value="";
    });

  document
    .querySelectorAll(".section select")
    .forEach(select=>{
      select.selectedIndex=0;
    });

  document
    .querySelectorAll(".section")
    .forEach(section=>{
      section.style.display="none";
    });

  document
    .querySelectorAll(".topRow input")
    .forEach(checkbox=>{
      checkbox.checked=false;
    });

  document
    .getElementById("providerTransferFields")
    .style.display="none";

  providerMode="provider";

  clearOutput();

  active="";

}

/* SAVE ACTIVITY LOG */
function saveActivityLog(){

  localStorage.setItem(
    "critterActivityLog",
    JSON.stringify(activityLog)
  );

}

/* UPDATE ENTRY COUNT */
function updateLogCount(){

  const count=activityLog.length;

  document
    .getElementById("logCount")
    .textContent=
      count===1
        ? "1 saved entry"
        : `${count} saved entries`;

}

/* DELETE ONE ACTIVITY LOG ENTRY */
function deleteLogEntry(entryId){

  activityLog=
    activityLog.filter(entry=>
      entry.id!==entryId
    );

  saveActivityLog();

  updateLogCount();

  showStatus("entry deleted");

}

/* VIEW ACTIVITY LOG */
function showActivityLog(){

  if(activityLog.length===0){

    alert("there are no saved entries.");

    return;

  }

  const logWindow=
    window.open(
      "",
      "critterActivityLogWindow"
    );

  if(!logWindow){

    alert(
      "please allow pop-ups to view the activity log."
    );

    return;

  }

  let rows="";

  activityLog.forEach(entry=>{

    rows+=`
      <tr data-entry-id="${escapeHTML(entry.id)}">

        <td>
          ${escapeHTML(entry.dateTime)}
        </td>

        <td>
          ${escapeHTML(entry.type)}
        </td>

        <td>
          ${escapeHTML(entry.agentId)}
        </td>

        <td>
          ${escapeHTML(entry.memberPa)}
        </td>

        <td>
          ${escapeHTML(entry.actionResolution)}
        </td>

        <td>
          <button
            class="deleteButton"
            onclick="deleteEntry(
              '${escapeJavaScript(entry.id)}',
              this
            )"
          >
            delete
          </button>
        </td>

      </tr>
    `;

  });

  logWindow.document.open();

  logWindow.document.write(`
    <!DOCTYPE html>
    <html>

    <head>

      <title>critter activity log</title>

      <style>

        body{
          background:#000;
          color:#fff;
          font-family:"Century Gothic",sans-serif;
          padding:20px;
        }

        h2{
          text-align:center;
        }

        table{
          width:100%;
          border-collapse:collapse;
        }

        th,
        td{
          border:1px solid #555;
          padding:10px;
          text-align:left;
          vertical-align:top;
        }

        th{
          background:#222;
        }

        td{
          background:#111;
        }

        button{
          padding:7px 12px;
          border:none;
          border-radius:6px;
          cursor:pointer;
          color:#fff;
        }

        .deleteButton{
          background:#722;
        }

        .deleteButton:hover{
          background:#933;
        }

        .emptyMessage{
          display:none;
          text-align:center;
          margin-top:20px;
          color:#aaa;
        }

      </style>

    </head>

    <body>

      <h2>activity log</h2>

      <table id="activityTable">

        <thead>

          <tr>
            <th>date/time</th>
            <th>type</th>
            <th>agt id</th>
            <th>mbr id/pa#</th>
            <th>action/res</th>
            <th>delete</th>
          </tr>

        </thead>

        <tbody>
          ${rows}
        </tbody>

      </table>

      <div
        id="emptyMessage"
        class="emptyMessage"
      >
        no saved entries
      </div>

      <script>

        function deleteEntry(entryId,button){

          const confirmed=
            confirm(
              "delete this activity log entry?"
            );

          if(!confirmed) return;

          if(
            window.opener &&
            !window.opener.closed
          ){

            window.opener
              .deleteLogEntry(entryId);

          }

          const row=
            button.closest("tr");

          if(row){
            row.remove();
          }

          const remainingRows=
            document.querySelectorAll(
              "#activityTable tbody tr"
            );

          if(remainingRows.length===0){

            document
              .getElementById("activityTable")
              .style.display="none";

            document
              .getElementById("emptyMessage")
              .style.display="block";

          }

        }

      <\/script>

    </body>

    </html>
  `);

  logWindow.document.close();

}

/* PROTECT DISPLAYED HTML */
function escapeHTML(value){

  const div=
    document.createElement("div");

  div.textContent=value || "";

  return div.innerHTML;

}

/* PROTECT POPUP JAVASCRIPT VALUES */
function escapeJavaScript(value){

  return String(value || "")
    .replace(/\\/g,"\\\\")
    .replace(/'/g,"\\'");

}

/* CLEAR ENTIRE ACTIVITY LOG */
function clearLog(){

  if(activityLog.length===0){

    alert("there are no saved entries.");

    return;

  }

  const confirmed=
    confirm(
      "are you sure you want to clear the entire activity log?"
    );

  if(!confirmed) return;

  activityLog=[];

  localStorage.removeItem(
    "critterActivityLog"
  );

  updateLogCount();

  showStatus("activity log cleared");

}

/* DOWNLOAD CSV FOR EXCEL */
function downloadCSV(){

  if(activityLog.length===0){

    alert(
      "there are no saved entries to download."
    );

    return;

  }

  const headers=[
    "Date/Time",
    "Type",
    "AGT ID",
    "MBR ID/PA#",
    "Action/Res"
  ];

  const rows=
    activityLog.map(entry=>[
      entry.dateTime,
      entry.type,
      entry.agentId,
      entry.memberPa,
      entry.actionResolution
    ]);

  const csvData=[
    headers,
    ...rows
  ]
  .map(row=>
    row
      .map(value=>csvEscape(value))
      .join(",")
  )
  .join("\n");

  const blob=
    new Blob(
      ["\uFEFF"+csvData],
      {
        type:"text/csv;charset=utf-8;"
      }
    );

  const link=
    document.createElement("a");

  const url=
    URL.createObjectURL(blob);

  const today=
    new Date()
      .toISOString()
      .split("T")[0];

  link.href=url;

  link.download=
    `critter-activity-log-${today}.csv`;

  document.body.appendChild(link);

  link.click();

  document.body.removeChild(link);

  URL.revokeObjectURL(url);

  showStatus("excel csv downloaded");

}

/* FORMAT CSV VALUES */
function csvEscape(value){

  const text=
    String(value || "")
      .replace(/"/g,'""');

  return `"${text}"`;

}

</script>

</body>
</html>
