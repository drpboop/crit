<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>critter</title>
<style>

:root{
  --bg:#050505;
  --panel:#111111;
  --panel-2:#181818;
  --border:#3b3218;
  --white:#ffffff;
  --yellow:#ffd84d;
  --mustard:#c99a24;
  --mustard-dark:#8f6814;
  --muted:#cfcfcf;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:"Century Gothic",Arial,sans-serif;
  background:var(--bg);
  color:var(--white);
}
.site-nav{
  background:#0d0d0d;
  padding:10px 16px;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:6px;
  border-bottom:1px solid var(--border);
}
.site-nav a{
  color:var(--white);
  text-decoration:none;
  padding:7px 10px;
  border-radius:6px;
  font-size:.9rem;
}
.site-nav a:hover{background:#2a2414;color:var(--yellow)}
.site-nav a.active{background:var(--mustard-dark);color:var(--white)}

.page{padding:20px}
.container{
  max-width:620px;margin:auto;background:var(--panel);padding:20px;
  border:1px solid var(--border);border-radius:10px
}
h2{text-align:center;color:var(--mustard)}
h3{text-align:center;color:var(--yellow)}
label{display:block;margin-top:10px;color:var(--yellow)}
input,select,textarea{
  width:100%;padding:10px;margin-top:5px;border:1px solid #655522;
  border-radius:6px;background:#222;color:var(--white);font-family:inherit
}
textarea{min-height:75px}
.section{display:none}
.selector-wrap{margin-bottom:16px}
.buttons{text-align:center;margin-top:15px}
button{
  padding:8px 14px;margin:5px;background:var(--mustard-dark);color:var(--white);
  border:none;border-radius:6px;cursor:pointer;font-family:inherit
}
button:hover{background:var(--mustard)}
.dangerButton{background:#6d1d1d}
.dangerButton:hover{background:#9d2b2b}
.output{margin-top:15px}
.output textarea{min-height:100px}
.logControls{margin-top:30px;padding-top:20px;border-top:1px solid var(--border);text-align:center}
.logCount{color:var(--white);font-size:14px;margin-bottom:8px}
.status{text-align:center;margin-top:10px;min-height:20px;color:var(--mustard)}
.transferFields{display:none;margin-top:15px;padding:12px;border:1px solid var(--border);border-radius:8px;background:var(--panel-2)}
.resetArea,.clearLogArea{text-align:center;margin-top:10px}
</style>
</head>
<body>
<nav class="site-nav">
<a href="https://drpboop.github.io/home/">home</a>
<a class="active" href="https://drpboop.github.io/crit/">critter</a>
<a href="https://drpboop.github.io/refill-lookback/">refill lookback</a>
<a href="https://drpboop.github.io/situational/">situational</a>
</nav>

<div class="page">
<div class="container">
<h2>critter</h2>

<div class="selector-wrap">
<label for="formType">form type</label>
<select id="formType">
<option value="">-- select crit or provider --</option>
<option value="crit">crit</option>
<option value="provider">provider</option>
</select>
</div>

<div id="crit" class="section">
<label>agt id</label><input class="persist" id="c_id">
<label>mbr id / pa#</label><input class="persist" id="c_mbr_pa">
<label>rx</label><input class="persist" id="c_rx">
<label>res</label>
<select id="c_quick">
<option value="">-- select --</option>
<option value="updated pa detailing on file to reflect dating approved by rph">pa dating</option>
<option value="updated pa detailing on file to reflect strength approved by rph">pa strength</option>
<option value="updated pa detailing on file to reflect drug approved by rph">pa drug</option>
<option value="updated pa on file to reflect quantity approved by rph">quantity update</option>
<option value="updated from pens to syringes per member request">pens → syringes mbr</option>
<option value="updated from pens to syringes per doctor's request">pens → syringes dr</option>
<option value="updated from syringes to pens per member request">syringes → pens mbr</option>
<option value="updated from syringes to pens per doctor's request">syringes → pens dr</option>
<option value="updated from multidose bottle to single-use vials per mdo request">multidose → vials</option>
<option value="updated pa detailing on file for high dollar on approved medication">high dollar</option>
<option value="transferred from previous account same type of plan and um review">same plan transfer</option>
<option value="pa cannot be transferred // new pa required">pa not transferable</option>
<option value="extended loading dose pa by 2 weeks per pharmacy request (verify claims received)">extended loading</option>
<option value="backdated to mm/dd/yyyy per mdo request">backdated</option>
<option value="added pa as it was not added when case was approved">missing pa</option>
<option value="updated rx restrictions and claims paid">rx restrictions</option>
<option value="called to go over denial // reviewed next steps">denial call</option>
<option value="called to go over approval // provided approval information">approval call</option>
<option value="advised clinical review cannot assist // referred to ssa">ssa redirect</option>
<option value="xfer to correct lob">xfer</option>
</select>
<label>resolution</label><textarea class="persist" id="c_res"></textarea>
</div>

<div id="provider" class="section">
<label>name</label><input class="persist" id="p_name">
<label>job title</label><input class="persist" id="p_title">
<label>npi#</label><input class="persist" id="p_npi">
<label>cb#</label><input class="persist" id="p_cb">
<label>fax#</label><input class="persist" id="p_fax">
<label>mbr id / pa#</label><input class="persist" id="p_mbr_pa">
<label>rx</label><input class="persist" id="p_rx">
<label>res</label>
<select class="persist" id="p_quick">
<option value="">-- select --</option>
<option value="verbal">verbal pa request</option>
<option value="xfer">xfer</option>
</select>

<div id="providerTransferFields" class="transferFields">
<label>xfer reason</label>
<select class="persist" id="p_xfer_reason">
<option value="">-- select --</option>
<option value="pa">pa</option>
<option value="appeal">appeal</option>
<option value="request p2p">request p2p</option>
<option value="go over denial">go over denial</option>
</select>
<label>xferred to</label><input class="persist" id="p_xfer_to">
</div>

<label>resolution</label><textarea class="persist" id="p_res"></textarea>
</div>

<div class="buttons">
<button onclick="generate()">create</button>
<button onclick="clearOutput()">clear</button>
</div>

<div id="output" class="output"></div>
<div class="resetArea"><button onclick="resetForm()">reset</button></div>
<div id="saveStatus" class="status"></div>

<div class="logControls">
<h3>activity log</h3>
<div id="logCount" class="logCount">0 saved entries</div>
<div class="buttons">
<button onclick="downloadCSV()">pop</button>
<button onclick="showActivityLog()">view</button>
</div>
<div class="clearLogArea">
<button class="dangerButton" onclick="clearLog()">clear log</button>
</div>
</div>
</div>
</div>

<script>
const stateKey="critterFormState";
const logKey="critterActivityLog";
let activityLog=[];

function saveFormState(){
  const state={
    formType:document.getElementById("formType").value,
    values:{},
    output:document.getElementById("generatedText")?.value||""
  };
  document.querySelectorAll(".persist").forEach(el=>state.values[el.id]=el.value);
  localStorage.setItem(stateKey,JSON.stringify(state));
}

function restoreFormState(){
  const state=JSON.parse(localStorage.getItem(stateKey)||"null");
  if(!state)return;
  document.getElementById("formType").value=state.formType||"";
  Object.entries(state.values||{}).forEach(([id,value])=>{
    const el=document.getElementById(id);
    if(el)el.value=value;
  });
  showSelectedForm();
  updateProviderFields(false);
  if(state.output){
    showOutput(state.output);
  }
}

function showSelectedForm(){
  const type=document.getElementById("formType").value;
  document.querySelectorAll(".section").forEach(section=>section.style.display="none");
  if(type)document.getElementById(type).style.display="block";
  saveFormState();
}

function addCrit(value){
  if(!value)return;
  const resolution=document.getElementById("c_res");
  resolution.value=resolution.value?resolution.value+" // "+value:value;
  document.getElementById("c_quick").selectedIndex=0;
  saveFormState();
}

function updateProviderFields(writeResolution=true){
  const mode=document.getElementById("p_quick").value;
  const transfer=document.getElementById("providerTransferFields");
  transfer.style.display=mode==="xfer"?"block":"none";

  if(!writeResolution)return;

  const rx=document.getElementById("p_rx").value.trim();
  const reason=document.getElementById("p_xfer_reason").value;
  const to=document.getElementById("p_xfer_to").value.trim();
  const resolution=document.getElementById("p_res");

  if(mode==="verbal"){
    resolution.value=`called to request a verbal pa for ${rx} // pega intake #`;
  }else if(mode==="xfer"){
    resolution.value=`called to check status on ${reason} // advised pa intake line // xferred to ${to}`;
  }
  saveFormState();
}

function showOutput(text){
  document.getElementById("output").innerHTML=`
    <textarea id="generatedText" readonly onclick="this.select()"></textarea>
    <div class="buttons"><button onclick="copyOutput()">copy</button></div>
  `;
  document.getElementById("generatedText").value=text;
}

function generate(){
  const type=document.getElementById("formType").value;
  if(!type){
    showStatus("please select crit or provider.");
    return;
  }

  let fullOutput="";
  let logEntry;

  if(type==="crit"){
    const agentId=document.getElementById("c_id").value.trim();
    const memberPa=document.getElementById("c_mbr_pa").value.trim();
    const rx=document.getElementById("c_rx").value.trim();
    const resolution=document.getElementById("c_res").value.trim();
    fullOutput=`${agentId} // ${rx} // ${resolution} // drp crit prime 866.202.3474`;
    logEntry={id:crypto.randomUUID?.()||String(Date.now()),dateTime:new Date().toLocaleString().toLowerCase(),type:"crit",agentId,memberPa,actionResolution:resolution};
  }else{
    const name=document.getElementById("p_name").value.trim();
    const title=document.getElementById("p_title").value.trim();
    const memberPa=document.getElementById("p_mbr_pa").value.trim();
    const rx=document.getElementById("p_rx").value.trim();
    const resolution=document.getElementById("p_res").value.trim();
    const mode=document.getElementById("p_quick").value==="xfer"?"xfer":"provider";
    fullOutput=`${name} // ${title} // ${rx} // ${resolution} // drp crit prime 866.202.3474`;
    logEntry={id:crypto.randomUUID?.()||String(Date.now()),dateTime:new Date().toLocaleString().toLowerCase(),type:mode,agentId:name,memberPa,actionResolution:resolution};
  }

  showOutput(fullOutput);
  activityLog.unshift(logEntry);
  saveLog();
  updateLogCount();
  saveFormState();
  showStatus("added");
}

async function copyOutput(){
  const area=document.getElementById("generatedText");
  if(!area)return;
  try{await navigator.clipboard.writeText(area.value);}
  catch{area.select();document.execCommand("copy");}
  showStatus("note copied");
}

function clearOutput(){
  document.getElementById("output").innerHTML="";
  saveFormState();
}

function resetForm(){
  document.getElementById("formType").value="";
  document.querySelectorAll(".persist").forEach(el=>{
    if(el.tagName==="SELECT")el.selectedIndex=0;else el.value="";
  });
  document.querySelectorAll(".section").forEach(section=>section.style.display="none");
  document.getElementById("providerTransferFields").style.display="none";
  document.getElementById("output").innerHTML="";
  localStorage.removeItem(stateKey);
  showStatus("reset");
}

function showStatus(message){
  const status=document.getElementById("saveStatus");
  status.textContent=message;
  setTimeout(()=>status.textContent="",2500);
}

function saveLog(){localStorage.setItem(logKey,JSON.stringify(activityLog));}
function updateLogCount(){
  const count=activityLog.length;
  document.getElementById("logCount").textContent=count===1?"1 saved entry":count+" saved entries";
}
function clearLog(){
  if(!activityLog.length)return alert("there are no saved entries.");
  if(!confirm("are you sure you want to clear the entire activity log?"))return;
  activityLog=[];
  localStorage.removeItem(logKey);
  updateLogCount();
  showStatus("activity log cleared");
}
function deleteLogEntry(id){
  activityLog=activityLog.filter(entry=>entry.id!==id);
  saveLog();
  updateLogCount();
}
function escapeHTML(value){
  const div=document.createElement("div");
  div.textContent=value||"";
  return div.innerHTML;
}
function showActivityLog(){
  if(!activityLog.length)return alert("there are no saved entries.");
  const w=window.open("","critterActivityLogWindow");
  if(!w)return alert("please allow pop-ups to view the activity log.");

  const rows=activityLog.map(entry=>`
    <tr>
      <td>${escapeHTML(entry.dateTime)}</td>
      <td>${escapeHTML(entry.type)}</td>
      <td>${escapeHTML(entry.agentId)}</td>
      <td>${escapeHTML(entry.memberPa)}</td>
      <td>${escapeHTML(entry.actionResolution)}</td>
      <td><button onclick="window.opener.deleteLogEntry('${entry.id}');this.closest('tr').remove()">delete</button></td>
    </tr>
  `).join("");

  w.document.write(`<!DOCTYPE html><html><head><title>activity log</title>
  <style>
  body{background:#050505;color:#fff;font-family:Century Gothic,Arial,sans-serif;padding:20px}
  h2{color:#c99a24;text-align:center}
  table{width:100%;border-collapse:collapse}
  th,td{border:1px solid #655522;padding:9px;text-align:left}
  th{color:#ffd84d;background:#211c0d}
  td{background:#111}
  button{background:#8f6814;color:#fff;border:0;border-radius:5px;padding:6px 10px}
  </style></head><body><h2>activity log</h2><table>
  <thead><tr><th>date/time</th><th>type</th><th>agt id</th><th>mbr id/pa#</th><th>action/res</th><th>delete</th></tr></thead>
  <tbody>${rows}</tbody></table></body></html>`);
  w.document.close();
}
function csvEscape(value){return '"'+String(value||"").replace(/"/g,'""')+'"';}
function downloadCSV(){
  if(!activityLog.length)return alert("there are no saved entries to download.");
  const rows=[["date/time","type","agt id","mbr id/pa#","action/res"],...activityLog.map(e=>[e.dateTime,e.type,e.agentId,e.memberPa,e.actionResolution])];
  const csv=rows.map(row=>row.map(csvEscape).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download="critter-activity-log-"+new Date().toISOString().split("T")[0]+".csv";
  link.click();
  URL.revokeObjectURL(link.href);
}

document.addEventListener("DOMContentLoaded",function(){
  try{activityLog=JSON.parse(localStorage.getItem(logKey))||[];}catch{activityLog=[];}
  updateLogCount();
  restoreFormState();

  document.getElementById("formType").addEventListener("change",showSelectedForm);
  document.getElementById("c_quick").addEventListener("change",function(){addCrit(this.value);});
  document.getElementById("p_quick").addEventListener("change",function(){updateProviderFields(true);});
  document.getElementById("p_rx").addEventListener("input",function(){if(document.getElementById("p_quick").value==="verbal")updateProviderFields(true);});
  document.getElementById("p_xfer_reason").addEventListener("change",function(){updateProviderFields(true);});
  document.getElementById("p_xfer_to").addEventListener("input",function(){updateProviderFields(true);});
  document.querySelectorAll(".persist").forEach(el=>{
    el.addEventListener("input",saveFormState);
    el.addEventListener("change",saveFormState);
  });
});
</script>
</body>
</html>
