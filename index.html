<!DOCTYPE html>
<html>
<head>
<title>critter</title>

<style>
body {
  background:#000;
  color:#fff;
  font-family:"Century Gothic",sans-serif;
  padding:20px;
}

.container {
  max-width:600px;
  margin:auto;
  background:#111;
  padding:20px;
  border-radius:10px;
}

h2 { text-align:center; }

label {
  display:block;
  margin-top:10px;
}

input, select, textarea {
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  background:#222;
  color:#fff;
}

textarea { min-height:70px; }

.section { display:none; }

.buttons {
  text-align:center;
  margin-top:15px;
}

button {
  padding:8px 14px;
  margin:5px;
  background:#444;
  color:#fff;
  border:none;
  border-radius:6px;
}

.output {
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h2>critter</h2>

<div class="buttons">
<label><input type="checkbox" onclick="show('crit')"> crit</label>
<label><input type="checkbox" onclick="show('provider')"> provider</label>
<label><input type="checkbox" onclick="show('xfer')"> xfer</label>
</div>

<!-- CRIT -->
<div id="crit" class="section">

<label>agent name</label>
<input id="c_name">

<label>agent id</label>
<input id="c_id">

<label>rx</label>
<input id="c_rx">

<label>resolution quick select</label>
<select onchange="addCrit(this.value)">
<option value="">-- select --</option>

<option value="updated pa detailing on file to reflect dating approved by rph">pa dating</option>
<option value="updated pa detailing on file to reflect strength approved by rph">pa strength</option>
<option value="updated pa detailing on file to reflect drug approved by rph">pa drug</option>
<option value="updated pa on file to reflect quantity approved by rph">quantity update</option>

<option value="updated from pens to syringes per member request">pens → syringes mbr</option>
<option value="updated from pens to syringes per doctor's request">pens → syringes dr</option>
<option value="updated from syringes to pens per member request">syringes → pens mbr</option>
<option value="updated from syringes to pens per doctor's request">syringes → pens dr</option>

<option value="updated from multidose bottle to single-use vials per mdo request">multidose → vials</option>

<option value="updated pa detailing on file for high dollar on approved medication">high dollar</option>

<option value="transferred from previous account same type of plan and um review">same plan transfer</option>

<option value="pa cannot be transferred // new pa required">pa not transferable</option>

<option value="extended loading dose pa by 2 weeks per pharmacy request (verify claims received)">extended loading</option>

<option value="backdated to mm/dd/yyyy per mdo request">backdated</option>

<option value="added pa as it was not added when case was approved">missing pa</option>

<option value="updated rx restrictions and claims paid">rx restrictions</option>

<option value="called to go over denial // reviewed next steps">denial call</option>
<option value="called to go over approval // provided approval information">approval call</option>

<option value="advised clinical review cannot assist // referred to ssa">ssa redirect</option>

</select>

<label>resolution</label>
<textarea id="c_res"></textarea>

</div>

<!-- PROVIDER -->
<div id="provider" class="section">

<label>name</label>
<input id="p_name">

<label>job title</label>
<input id="p_title">

<label>npi</label>
<input id="p_npi">

<label>cb#</label>
<input id="p_cb">

<label>fax#</label>
<input id="p_fax">

<label>rx</label>
<input id="p_rx" oninput="updateProvider()">

<label>resolution quick select</label>
<select onchange="providerPick(this.value)">
<option value="">-- select --</option>
<option value="verbal">verbal pa request</option>
</select>

<label>resolution</label>
<textarea id="p_res"></textarea>

</div>

<!-- XFER -->
<div id="xfer" class="section">

<label>caller name</label>
<input id="x_name">

<label>facility / npi</label>
<input id="x_fac">

<label>rx</label>
<input id="x_rx">

<label>xferred to</label>
<input id="x_to">

<label>reason</label>
<select id="x_reason">
<option value="">-- select --</option>
<option value="pa">pa</option>
<option value="appeal">appeal</option>
<option value="request p2p">request p2p</option>
<option value="go over denial">go over denial</option>
</select>

</div>

<div class="buttons">
<button onclick="generate()">generate</button>
<button onclick="clearOutput()">clear output</button>
<button onclick="resetForm()">reset form</button>
</div>

<div id="output" class="output"></div>

</div>

<script>

let active="";

function show(type){
  active=type;
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(type).style.display="block";
}

/* CRIT STACK */
function addCrit(val){
  if(!val) return;
  c_res.value = c_res.value ? c_res.value+" // "+val : val;
}

/* PROVIDER */
function providerPick(val){
 if(val==="verbal"){
   p_res.value=`called to request a verbal pa for ${p_rx.value} // pega intake #`;
 }
}

function updateProvider(){
 if(p_res.value.includes("verbal pa")){
   p_res.value=`called to request a verbal pa for ${p_rx.value} // pega intake #`;
 }
}

/* XFER BUILD */
function buildXfer(){
  return `called to check status on ${x_reason.value} // advised pa intake line and connected them w/colleague // xferred to ${x_to.value}`;
}

/* GENERATE */
function generate(){
 let text="";

 if(active==="crit"){
  text=`${c_name.value} // ${c_id.value} // ${c_rx.value} // ${c_res.value} // drp crit prime 866.202.3474`;
 }

 if(active==="provider"){
  text=`${p_name.value} // ${p_title.value} // npi#${p_npi.value} // cb#${p_cb.value} // fax#${p_fax.value} // ${p_rx.value} // ${p_res.value} // drp crit prime 866.202.3474`;
 }

 if(active==="xfer"){
  text=`${x_name.value} // ${x_fac.value} // ${x_rx.value} // ${buildXfer()} // drp crit prime 866.202.3474`;
 }

 output.innerHTML = `
 <textarea onclick="this.select()">${text}</textarea>
 <div class="buttons"><button onclick="copy()">copy</button></div>`;
}

function copy(){
 let t=document.querySelector("#output textarea");
 t.select();
 document.execCommand("copy");
}

function clearOutput(){ output.innerHTML=""; }

function resetForm(){
 document.querySelectorAll("input,textarea").forEach(e=>e.value="");
 document.querySelectorAll(".section").forEach(s=>s.style.display="none");
 clearOutput();
 active="";
}

</script>

</body>
</html>
